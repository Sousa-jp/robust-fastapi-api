app:
  name: robust-fastapi-api
  version: "0.1.0"
  description: API de referência FastAPI com boas práticas
  debug: "${DEBUG:-false}"
  timezone: "${APP_TIMEZONE:-UTC}"

logging:
  level: INFO
  sensitive_keys:
    - password
    - access_token
    - authorization
    - token
    - secret
  ignore_paths:
    - /docs
    - /redoc
    - /openapi.json
    - /v1/health

cors:
  allow_origins: "${CORS_ALLOW_ORIGINS:-*}"
  allow_credentials: "${CORS_ALLOW_CREDENTIALS:-true}"
  allow_methods: "${CORS_ALLOW_METHODS:-'GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS'}"
  allow_headers: "${CORS_ALLOW_HEADERS:-*}"

database:
  url: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"

redis:
  url: "redis://${REDIS_HOST}:${REDIS_PORT}/0"

security:
  secret_key: "${SECURITY_SECRET_KEY:-secret}"
  algorithm: "${SECURITY_ALGORITHM:-HS256}"
  access_token_expire_minutes: "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
  refresh_token_expire_days: "${REFRESH_TOKEN_EXPIRE_DAYS:-7}"
  session_https_only: "${SESSION_HTTPS_ONLY:-false}"

email:
  email_host: "${EMAIL_HOST:-smtp.gmail.com}"
  email_port: "${EMAIL_PORT:-587}"
  email_username: "${EMAIL_USERNAME:-apikey}"
  email_password: "${EMAIL_PASSWORD:-your-email-password-or-your-api-key}"
  email_from: "${EMAIL_FROM:-noreply@xertica.com}"
  from_name: "${EMAIL_FROM_NAME:-Access Control System}"
  use_tls: "${EMAIL_USE_TLS:-true}"
  use_ssl: "${EMAIL_USE_SSL:-false}"
  suppress_send: "${EMAIL_SUPPRESS_SEND:-false}"

oauth:
  google_client_id: "${GOOGLE_CLIENT_ID:-}"
  google_client_secret: "${GOOGLE_CLIENT_SECRET:-}"
  microsoft_client_id: "${MICROSOFT_CLIENT_ID:-}"
  microsoft_client_secret: "${MICROSOFT_CLIENT_SECRET:-}"
  microsoft_tenant_id: "${MICROSOFT_TENANT_ID:-}"

account_domain: "${ACCOUNT_DOMAIN:-*}"
frontend_url: "${FRONTEND_URL:-http://localhost:3000}"
dns_on: "${DNS_ON:-false}"
